<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  ============================================================================
  EventHorizon - index.html (Standalone / GitHub Pages)
  ============================================================================

  PURPOSE:
    Three-column admin dashboard for EventHorizon calendar sync. Desktop only.
    Left: APA events (poolplayers.com). Center: linked pairs. Right: Google
    Calendar events. Supports create, link, update, unlink actions.

  AUTHENTICATION:
    Admin token from URL query param: ?admin=<token>
    If missing, shows lock icon and blocks all UI.
    Token auto-injected into every API call via SPM.callServer.

  ARCHITECTURE:
    Standalone build — NO GAS runtime dependency.
    Uses spm-core.js for fetch() POST to Cloudflare Worker
    (eventhorizon.spmapa.workers.dev) → GAS doPost.

  API ROUTES (via SPM.callServer):
    getSyncStatus        — returns { syncItems[] } with sync comparison data
    createCalendarEvent  — creates a Google Calendar event from APA event
    linkEvents           — links APA event to existing calendar event
    updateCalendarEvent  — updates linked calendar event with APA data
    unlinkEvent          — removes link between APA and calendar events

  SYNC ITEM SHAPE (from getSyncStatus):
    status:       'linked' | 'unlinked' | 'calendar_only'
    needsUpdate:  boolean (only on linked items)
    diffs:        string[] (field names that differ, only on linked items)
    apaEvent:     { apaEventId, title, start, end, organizer, email,
                    description, location: { name, address, city, zip } }
    calendarEvent:{ calendarEventId, apaEventId, title, start, end,
                    location (string), description, isAllDay }

  THREE-COLUMN LAYOUT:
    Left:   APA Events — all items with apaEvent. Linked ones faded.
    Center: Linked Pairs — linked items (with or without needsUpdate).
    Right:  Calendar Events — all items with calendarEvent. Linked ones faded.

  LINKING FLOW:
    1. User clicks "Link ▸" on an APA event card
    2. Card gets blue selected border, banner appears at top
    3. Calendar column cards become clickable with hover effect
    4. User clicks a calendar event → linkEvents API → refresh
    5. Cancel returns to normal state

  DESKTOP ONLY:
    No mobile/tablet responsive code. No device detection.

  BRANDING:
    --spm-primary: #ea002a (red), --spm-accent: #0031a1 (blue)
    Shared spm-base.css for card, button, badge, header classes.

  ============================================================================
  -->
  <title>EventHorizon — South Portland Metro APA</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://southportlandmetroapa.github.io/shared/spm-base.css">
  <style>
    /* ==================================================================
       App-Specific CSS — EventHorizon Three-Column Dashboard
       ==================================================================
       Desktop-only admin tool. CSS Grid three-column layout.
       Extends spm-base.css shared classes.
       ================================================================== */

    /* -- Auth error page ------------------------------------------------ */
    .auth-error {
      text-align: center;
      padding: 48px 24px;
    }
    .auth-error-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .auth-error-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .auth-error-msg {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* -- Header extras -------------------------------------------------- */
    .spm-header .header-tag {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* -- Top bar (refresh + status) ------------------------------------- */
    .eh-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 0;
    }
    .eh-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .eh-refresh-btn {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 40px;
    }
    .eh-refresh-btn:hover {
      background: var(--bg);
    }
    .eh-refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .eh-topbar-status {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* -- Error banner --------------------------------------------------- */
    .eh-error-banner {
      background: #fef2f2;
      border: 1px solid var(--spm-primary);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 0 16px 12px;
      color: #991b1b;
      font-size: 0.875rem;
      font-weight: 600;
      display: none;
    }

    /* -- Linking mode banner -------------------------------------------- */
    .eh-link-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px;
      margin: 0 16px 8px;
      background: #eff6ff;
      border: 2px solid var(--spm-accent);
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1e40af;
    }
    .eh-link-banner.active {
      display: flex;
    }
    .eh-link-banner-cancel {
      padding: 4px 16px;
      border: 1px solid #3b82f6;
      border-radius: 999px;
      background: #fff;
      color: #1d4ed8;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 32px;
    }
    .eh-link-banner-cancel:hover {
      background: #dbeafe;
    }

    /* -- Three-column grid ---------------------------------------------- */
    .eh-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 0;
      height: calc(100svh - 160px);
      min-height: 400px;
    }

    /* -- Column --------------------------------------------------------- */
    .eh-col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .eh-col:last-child {
      border-right: none;
    }
    .eh-col-header {
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .eh-col-header-count {
      font-size: 0.8125rem;
      font-weight: 800;
      background: rgba(255,255,255,0.25);
      padding: 2px 10px;
      border-radius: 999px;
    }

    /* Column header colors */
    .eh-col--apa .eh-col-header {
      background: var(--spm-primary);
    }
    .eh-col--linked .eh-col-header {
      background: #166534;
    }
    .eh-col--cal .eh-col-header {
      background: var(--spm-accent);
    }

    /* Column filter input */
    .eh-col-filter {
      padding: 8px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .eh-col-filter input {
      width: 100%;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8125rem;
      font-family: inherit;
      min-height: 32px;
    }
    .eh-col-filter input:focus {
      outline: 2px solid var(--spm-accent);
      outline-offset: -2px;
    }

    /* Column scrollable body */
    .eh-col-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      background: var(--bg);
    }

    /* -- Event card (used in left and right columns) -------------------- */
    .eh-event-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s, opacity 0.15s, box-shadow 0.15s;
    }
    .eh-event-card-title {
      font-weight: 700;
      font-size: 0.875rem;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .eh-event-card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .eh-event-card-meta div {
      margin-bottom: 2px;
    }
    .eh-event-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .eh-event-card-actions button {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 28px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .eh-btn-create {
      background: var(--spm-primary);
      color: #fff;
      border: none;
    }
    .eh-btn-create:hover {
      background: #c40023;
    }
    .eh-btn-link {
      background: #fff;
      color: var(--spm-accent);
      border: 1px solid var(--spm-accent);
    }
    .eh-btn-link:hover {
      background: #eff6ff;
    }

    /* Linked/muted card state (in left/right columns) */
    .eh-event-card.is-linked {
      opacity: 0.5;
    }
    .eh-event-card .linked-badge {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #166534;
      background: #dcfce7;
      padding: 1px 8px;
      border-radius: 999px;
      margin-bottom: 4px;
    }

    /* Selected card (linking mode) */
    .eh-event-card.is-selected {
      border-color: var(--spm-accent);
      box-shadow: 0 0 0 2px rgba(0, 49, 161, 0.2);
      opacity: 1;
    }

    /* Clickable card in linking mode (calendar column) */
    .eh-col--cal.linking-mode .eh-event-card:not(.is-linked) {
      cursor: pointer;
    }
    .eh-col--cal.linking-mode .eh-event-card:not(.is-linked):hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
      background: #f0f7ff;
    }

    /* -- Linked pair card (center column) ------------------------------- */
    .eh-pair-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .eh-pair-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .eh-pair-card-title {
      font-weight: 700;
      font-size: 0.875rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .eh-pair-badge-linked {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #166534;
      background: #dcfce7;
      padding: 1px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .eh-pair-badge-update {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #9a3412;
      background: #ffedd5;
      padding: 1px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    /* Side-by-side event panels inside pair card */
    .eh-pair-sides {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .eh-pair-side {
      padding: 8px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .eh-pair-side-label {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .eh-pair-field {
      font-size: 0.75rem;
      line-height: 1.4;
      margin-bottom: 2px;
    }
    .eh-pair-field-label {
      font-weight: 700;
      color: var(--muted);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .eh-pair-field-value {
      font-weight: 500;
    }
    .eh-pair-field-diff {
      color: #9a3412;
      background: #ffedd5;
      padding: 0 4px;
      border-radius: 4px;
    }

    /* Pair card actions */
    .eh-pair-actions {
      display: flex;
      gap: 8px;
    }
    .eh-pair-actions button {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 28px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .eh-btn-update {
      background: #f97316;
      color: #fff;
      border: none;
    }
    .eh-btn-update:hover {
      background: #ea580c;
    }
    .eh-btn-unlink {
      background: #fff;
      color: #6b7280;
      border: 1px solid var(--border);
    }
    .eh-btn-unlink:hover {
      background: #f3f4f6;
    }

    /* -- Skeleton loaders ----------------------------------------------- */
    .eh-skeleton {
      background: linear-gradient(90deg, #e5e5e5 25%, #f0f0f0 50%, #e5e5e5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      height: 72px;
      margin-bottom: 8px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* -- Toast ---------------------------------------------------------- */
    .eh-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #166534;
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .eh-toast.show {
      opacity: 1;
    }

    /* -- Empty state ---------------------------------------------------- */
    .eh-empty {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 0.8125rem;
    }

    /* -- Fullpage layout (no spm-page max-width constraint) ------------- */
    body {
      margin: 0;
    }
    .eh-page {
      display: flex;
      flex-direction: column;
      height: 100svh;
      overflow: hidden;
    }
    .eh-page .spm-header {
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="eh-page">

    <!-- ================================================================ -->
    <!-- Header -->
    <!-- ================================================================ -->
    <div class="spm-header">
      <h1>South Portland Metro APA</h1>
      <div class="spm-subtitle">EventHorizon</div>
      <div class="header-tag">Calendar Sync</div>
    </div>

    <!-- ================================================================ -->
    <!-- Auth error (shown when admin token is missing) -->
    <!-- ================================================================ -->
    <div id="authError" style="display: none;">
      <div class="auth-error">
        <div class="auth-error-icon">&#128274;</div>
        <div class="auth-error-title">Admin Token Required</div>
        <div class="auth-error-msg">
          This page requires an admin token.<br>
          Access it via: index.html?admin=&lt;token&gt;
        </div>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- Main content (hidden until auth passes) -->
    <!-- ================================================================ -->
    <div id="mainContent" style="display: none; flex: 1; overflow: hidden; display: flex; flex-direction: column;">

      <!-- Top bar: refresh button + status -->
      <div class="eh-topbar">
        <div class="eh-topbar-left">
          <button class="eh-refresh-btn" id="refreshBtn">&#8635; Refresh</button>
        </div>
        <div class="eh-topbar-status" id="statusText">Loading...</div>
      </div>

      <!-- Error banner -->
      <div class="eh-error-banner" id="errorBanner"></div>

      <!-- Linking mode banner -->
      <div class="eh-link-banner" id="linkBanner">
        <span id="linkBannerText">Select a calendar event to link to...</span>
        <button class="eh-link-banner-cancel" id="linkBannerCancel">Cancel</button>
      </div>

      <!-- Three-column grid -->
      <div class="eh-grid" id="gridContainer">

        <!-- LEFT: APA Events -->
        <div class="eh-col eh-col--apa" id="colApa">
          <div class="eh-col-header">
            <span>APA Events (poolplayers.com)</span>
            <span class="eh-col-header-count" id="countApa">0</span>
          </div>
          <div class="eh-col-filter">
            <input type="text" id="filterApa" placeholder="Filter APA events...">
          </div>
          <div class="eh-col-body" id="listApa">
            <div class="eh-skeleton"></div>
            <div class="eh-skeleton"></div>
            <div class="eh-skeleton"></div>
          </div>
        </div>

        <!-- CENTER: Linked Pairs -->
        <div class="eh-col eh-col--linked" id="colLinked">
          <div class="eh-col-header">
            <span>Linked</span>
            <span class="eh-col-header-count" id="countLinked">0</span>
          </div>
          <div class="eh-col-body" id="listLinked">
            <div class="eh-skeleton"></div>
            <div class="eh-skeleton"></div>
          </div>
        </div>

        <!-- RIGHT: Google Calendar Events -->
        <div class="eh-col eh-col--cal" id="colCal">
          <div class="eh-col-header">
            <span>Google Calendar</span>
            <span class="eh-col-header-count" id="countCal">0</span>
          </div>
          <div class="eh-col-filter">
            <input type="text" id="filterCal" placeholder="Filter calendar events...">
          </div>
          <div class="eh-col-body" id="listCal">
            <div class="eh-skeleton"></div>
            <div class="eh-skeleton"></div>
            <div class="eh-skeleton"></div>
          </div>
        </div>

      </div><!-- end eh-grid -->

    </div><!-- end mainContent -->

  </div><!-- end eh-page -->

  <!-- ================================================================== -->
  <!-- Toast -->
  <!-- ================================================================== -->
  <div class="eh-toast" id="toast"></div>

  <!-- ================================================================== -->
  <!-- Scripts -->
  <!-- ================================================================== -->

  <!-- SPM_CONFIG must be set BEFORE spm-core.js loads -->
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('admin') || '';
      window.SPM_CONFIG = {
        apiUrl: 'https://eventhorizon.spmapa.workers.dev',
        contentType: 'text/plain',
        adminToken: token
      };
    })();
  </script>
  <script src="https://southportlandmetroapa.github.io/shared/spm-core.js"></script>

  <script>
    // ======================================================================
    // EventHorizon — Three-Column Sync Dashboard
    // ======================================================================
    //
    // Desktop-only admin dashboard. Three independently scrollable columns:
    //   Left:   APA events (all items with apaEvent)
    //   Center: Linked pairs (status=linked items)
    //   Right:  Calendar events (all items with calendarEvent)
    //
    // DEPENDENCIES:
    //   - spm-core.js: SPM.esc(), SPM.callServer(), SPM.setStatus()
    //   - spm-base.css: card, button, badge, header classes
    //
    // DATA FLOW:
    //   1. On load → getSyncStatus → split into 3 lists → render columns
    //   2. User action → create / link / update / unlink API call
    //   3. After action → toast + full refresh (getSyncStatus again)
    //
    // LINKING FLOW:
    //   1. User clicks "Link ▸" on APA card → enters linking mode
    //   2. Banner shown, calendar cards become clickable
    //   3. Click calendar card → linkEvents API → refresh
    //   4. Cancel exits linking mode
    //
    // ======================================================================


    // -- Module state -------------------------------------------------------

    /** Raw syncItems array from the last getSyncStatus call */
    var syncItems = [];

    /** Derived lists for the three columns */
    var apaList = [];       // All items with apaEvent (linked + unlinked)
    var linkedList = [];    // Items with status=linked (includes needsUpdate)
    var calList = [];       // All items with calendarEvent (linked + calendar_only)

    /** Set of linked apaEventIds for quick lookup */
    var linkedApaIds = {};

    /** Set of linked calendarEventIds for quick lookup */
    var linkedCalIds = {};

    /** Linking mode state: the apaEventId being linked, or null */
    var linkingApaEventId = null;

    /** Linking mode: the APA event title (for the banner) */
    var linkingApaTitle = '';


    // ======================================================================
    // Date Formatting
    // ======================================================================

    /**
     * Formats an ISO date string (YYYY-MM-DD or full ISO) as "Saturday, March 28".
     * Uses the browser's Intl.DateTimeFormat for locale-aware day/month names.
     *
     * @param {string} dateStr - ISO date string, e.g. "2026-03-28"
     * @returns {string} formatted date, e.g. "Saturday, March 28"
     */
    function formatDate(dateStr) {
      if (!dateStr) return '';
      // Handle full ISO datetime (2026-03-28T09:00:00-07:00) or date-only (2026-03-28)
      var datePart = dateStr.split('T')[0];
      var parts = datePart.split('-');
      if (parts.length < 3) return dateStr;
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      return d.toLocaleDateString('en-US', {
        weekday: 'long',
        month: 'long',
        day: 'numeric'
      });
    }

    /**
     * Formats a short date for card display: "Mar 28" (no weekday).
     *
     * @param {string} dateStr - ISO date string
     * @returns {string} e.g. "Mar 28"
     */
    function formatShortDate(dateStr) {
      if (!dateStr) return '';
      var datePart = dateStr.split('T')[0];
      var parts = datePart.split('-');
      if (parts.length < 3) return dateStr;
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      return d.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric'
      });
    }

    /**
     * Formats a time string for display. Expects HH:MM (24h) or already
     * formatted strings. Converts to 12-hour format with AM/PM.
     *
     * @param {string} timeStr - e.g. "09:00" or "17:00"
     * @returns {string} e.g. "9:00 AM"
     */
    function formatTime(timeStr) {
      if (!timeStr) return '';
      // If already has AM/PM, return as-is
      if (/[AaPp][Mm]/.test(timeStr)) return timeStr;
      var parts = timeStr.split(':');
      var h = parseInt(parts[0], 10);
      var m = parts[1] || '00';
      var ampm = h >= 12 ? 'PM' : 'AM';
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;
      return h + ':' + m + ' ' + ampm;
    }

    /**
     * Formats a time range for display.
     *
     * @param {string} start - start time, e.g. "09:00" or ISO datetime
     * @param {string} end   - end time, e.g. "17:00" or ISO datetime
     * @returns {string} e.g. "9:00 AM – 5:00 PM" or single time if no end
     */
    function formatTimeRange(start, end) {
      var startTime = extractTime(start);
      var endTime = extractTime(end);
      var s = formatTime(startTime);
      var e = formatTime(endTime);
      if (s && e) return s + ' \u2013 ' + e;
      return s || e || '';
    }

    /**
     * Extract HH:MM from an ISO datetime string or return '' if date-only.
     *
     * @param {string} str - ISO datetime or time string
     * @returns {string} "HH:MM" or ""
     */
    function extractTime(str) {
      if (!str) return '';
      // Date-only strings (all-day events) have no 'T'
      if (str.indexOf('T') === -1) return '';
      // "2026-03-28T09:00:00-07:00" → "09:00"
      var timePart = str.split('T')[1];
      if (!timePart) return '';
      return timePart.substring(0, 5);
    }


    // ======================================================================
    // Location Formatting
    // ======================================================================

    /**
     * Formats a location for display. APA events have location as an object
     * { name, address, city, zip }. Calendar events have location as a string.
     *
     * @param {string|Object} loc - location data
     * @returns {string} formatted location string
     */
    function formatLocation(loc) {
      if (!loc) return '';
      if (typeof loc === 'string') return loc;
      // Object: { name, address, city, zip }
      return [loc.name, loc.address, loc.city, loc.zip].filter(Boolean).join(', ');
    }


    // ======================================================================
    // Data Processing
    // ======================================================================

    /**
     * Splits raw syncItems into the three column lists and builds lookup
     * sets for linked IDs. Called after each getSyncStatus response.
     */
    function processSyncItems() {
      apaList = [];
      linkedList = [];
      calList = [];
      linkedApaIds = {};
      linkedCalIds = {};

      for (var i = 0; i < syncItems.length; i++) {
        var item = syncItems[i];

        // Build linked ID lookup sets
        if (item.status === 'linked' && item.apaEvent && item.calendarEvent) {
          linkedApaIds[item.apaEvent.apaEventId] = true;
          linkedCalIds[item.calendarEvent.calendarEventId] = true;
        }

        // Left column: all items that have an apaEvent
        if (item.apaEvent) {
          apaList.push(item);
        }

        // Center column: linked items only
        if (item.status === 'linked') {
          linkedList.push(item);
        }

        // Right column: all items that have a calendarEvent
        if (item.calendarEvent) {
          calList.push(item);
        }
      }

      // Sort each list by date ascending
      var dateSorter = function(a, b) {
        var da = a.sortDate || (a.apaEvent && a.apaEvent.start) || (a.calendarEvent && a.calendarEvent.start) || '';
        var db = b.sortDate || (b.apaEvent && b.apaEvent.start) || (b.calendarEvent && b.calendarEvent.start) || '';
        return da.localeCompare(db);
      };
      apaList.sort(dateSorter);
      linkedList.sort(dateSorter);
      calList.sort(dateSorter);
    }


    // ======================================================================
    // Rendering — Left Column (APA Events)
    // ======================================================================

    /**
     * Renders the APA events column. Unlinked events get action buttons.
     * Linked events are faded with a "Linked" badge.
     *
     * @param {string} filter - search filter (case-insensitive)
     */
    function renderApaColumn(filter) {
      var container = document.getElementById('listApa');
      var lower = (filter || '').toLowerCase();

      var filtered = apaList.filter(function(item) {
        if (!lower) return true;
        var evt = item.apaEvent;
        var haystack = ((evt.title || '') + ' ' + formatLocation(evt.location) + ' ' + (evt.organizer || '') + ' ' + formatDate(evt.start)).toLowerCase();
        return haystack.indexOf(lower) !== -1;
      });

      document.getElementById('countApa').textContent = apaList.length;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="eh-empty">' + (lower ? 'No matching APA events.' : 'No APA events found.') + '</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var evt = item.apaEvent;
        var isLinked = !!linkedApaIds[evt.apaEventId];
        var isSelected = (linkingApaEventId === evt.apaEventId);

        var cardClass = 'eh-event-card';
        if (isLinked && !isSelected) cardClass += ' is-linked';
        if (isSelected) cardClass += ' is-selected';

        html += '<div class="' + cardClass + '" data-apa-id="' + SPM.esc(evt.apaEventId) + '">';

        // Linked badge (for linked cards)
        if (isLinked) {
          html += '<span class="linked-badge">\u2713 Linked</span>';
        }

        // Title
        html += '<div class="eh-event-card-title">' + SPM.esc(evt.title || 'Untitled') + '</div>';

        // Meta: date, time, location, organizer
        html += '<div class="eh-event-card-meta">';
        if (evt.start) {
          html += '<div>' + SPM.esc(formatShortDate(evt.start));
          var timeRange = formatTimeRange(evt.start, evt.end);
          if (timeRange) html += ' &middot; ' + SPM.esc(timeRange);
          html += '</div>';
        }
        var loc = formatLocation(evt.location);
        if (loc) {
          html += '<div>' + SPM.esc(loc) + '</div>';
        }
        if (evt.organizer) {
          html += '<div>' + SPM.esc(evt.organizer) + '</div>';
        }
        html += '</div>'; // end meta

        // Action buttons (only for unlinked)
        if (!isLinked) {
          html += '<div class="eh-event-card-actions">';
          html += '<button class="eh-btn-create" onclick="doCreate(\'' + SPM.esc(evt.apaEventId) + '\')">Create New</button>';
          html += '<button class="eh-btn-link" onclick="enterLinkingMode(\'' + SPM.esc(evt.apaEventId) + '\', \'' + SPM.esc((evt.title || '').replace(/'/g, "\\'")) + '\')">Link \u25b8</button>';
          html += '</div>';
        }

        html += '</div>'; // end card
      }

      container.innerHTML = html;
    }


    // ======================================================================
    // Rendering — Center Column (Linked Pairs)
    // ======================================================================

    /**
     * Renders the linked pairs column. Each card shows APA ↔ Calendar
     * side by side. Items with needsUpdate get an orange badge and Update button.
     */
    function renderLinkedColumn() {
      var container = document.getElementById('listLinked');

      // Count: linked with needsUpdate + linked without
      var needsUpdateCount = 0;
      for (var n = 0; n < linkedList.length; n++) {
        if (linkedList[n].needsUpdate) needsUpdateCount++;
      }
      document.getElementById('countLinked').textContent = linkedList.length;

      if (linkedList.length === 0) {
        container.innerHTML = '<div class="eh-empty">No linked events yet.</div>';
        return;
      }

      var html = '';
      // Sort: needsUpdate first
      var sorted = linkedList.slice().sort(function(a, b) {
        if (a.needsUpdate && !b.needsUpdate) return -1;
        if (!a.needsUpdate && b.needsUpdate) return 1;
        return 0;
      });

      for (var i = 0; i < sorted.length; i++) {
        var item = sorted[i];
        var apa = item.apaEvent;
        var cal = item.calendarEvent;

        html += '<div class="eh-pair-card">';

        // Header: title + badge
        html += '<div class="eh-pair-card-header">';
        html += '<div class="eh-pair-card-title">' + SPM.esc(apa ? apa.title : (cal ? cal.title : 'Untitled')) + '</div>';
        if (item.needsUpdate) {
          html += '<span class="eh-pair-badge-update">Needs Update</span>';
        } else {
          html += '<span class="eh-pair-badge-linked">Linked</span>';
        }
        html += '</div>';

        // Side-by-side panels
        html += '<div class="eh-pair-sides">';

        // APA side
        html += '<div class="eh-pair-side">';
        html += '<div class="eh-pair-side-label">APA Event</div>';
        html += renderPairFields(apa, item.diffs, 'apa');
        html += '</div>';

        // Calendar side
        html += '<div class="eh-pair-side">';
        html += '<div class="eh-pair-side-label">Google Calendar</div>';
        html += renderPairFields(cal, item.diffs, 'cal');
        html += '</div>';

        html += '</div>'; // end sides

        // Actions
        html += '<div class="eh-pair-actions">';
        if (item.needsUpdate && apa && cal) {
          html += '<button class="eh-btn-update" onclick="doUpdate(\'' + SPM.esc(cal.calendarEventId) + '\', \'' + SPM.esc(apa.apaEventId) + '\')">Update</button>';
        }
        if (cal) {
          html += '<button class="eh-btn-unlink" onclick="doUnlink(\'' + SPM.esc(cal.calendarEventId) + '\')">Unlink</button>';
        }
        html += '</div>';

        html += '</div>'; // end pair card
      }

      container.innerHTML = html;
    }

    /**
     * Renders the field rows for one side of a pair card.
     * Highlights fields that differ (listed in diffs[]).
     *
     * @param {Object} evt - event object (apa or calendar)
     * @param {string[]} diffs - field names that differ
     * @param {string} side - 'apa' or 'cal' (determines field name mapping)
     * @returns {string} HTML
     */
    function renderPairFields(evt, diffs, side) {
      if (!evt) return '<div style="color:var(--muted); font-style:italic; font-size:0.75rem;">No data</div>';
      diffs = diffs || [];

      var html = '';

      // Title
      var title = evt.title || '';
      var titleDiff = diffs.indexOf('title') !== -1;
      html += '<div class="eh-pair-field"><span class="eh-pair-field-value' + (titleDiff ? ' eh-pair-field-diff' : '') + '" style="font-weight:700;">' + SPM.esc(title) + '</span></div>';

      // Date + time
      var startStr = evt.start || '';
      if (startStr) {
        var dateDiff = diffs.indexOf('start') !== -1;
        html += '<div class="eh-pair-field"><span class="eh-pair-field-label">Date </span><span class="eh-pair-field-value' + (dateDiff ? ' eh-pair-field-diff' : '') + '">' + SPM.esc(formatShortDate(startStr)) + '</span></div>';
        var timeRange = formatTimeRange(startStr, evt.end || '');
        if (timeRange) {
          html += '<div class="eh-pair-field"><span class="eh-pair-field-label">Time </span><span class="eh-pair-field-value' + (dateDiff ? ' eh-pair-field-diff' : '') + '">' + SPM.esc(timeRange) + '</span></div>';
        }
      }

      // Location
      var loc = formatLocation(evt.location);
      if (loc) {
        var locDiff = diffs.indexOf('location') !== -1;
        html += '<div class="eh-pair-field"><span class="eh-pair-field-label">Location </span><span class="eh-pair-field-value' + (locDiff ? ' eh-pair-field-diff' : '') + '">' + SPM.esc(loc) + '</span></div>';
      }

      return html;
    }


    // ======================================================================
    // Rendering — Right Column (Calendar Events)
    // ======================================================================

    /**
     * Renders the Google Calendar events column. Linked events are faded.
     * When in linking mode, unlinked cards become clickable.
     *
     * @param {string} filter - search filter (case-insensitive)
     */
    function renderCalColumn(filter) {
      var container = document.getElementById('listCal');
      var lower = (filter || '').toLowerCase();

      var filtered = calList.filter(function(item) {
        if (!lower) return true;
        var evt = item.calendarEvent;
        var haystack = ((evt.title || '') + ' ' + (evt.location || '') + ' ' + formatDate(evt.start)).toLowerCase();
        return haystack.indexOf(lower) !== -1;
      });

      document.getElementById('countCal').textContent = calList.length;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="eh-empty">' + (lower ? 'No matching calendar events.' : 'No calendar events found.') + '</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var evt = item.calendarEvent;
        var isLinked = !!linkedCalIds[evt.calendarEventId];

        var cardClass = 'eh-event-card';
        if (isLinked) cardClass += ' is-linked';

        // In linking mode, unlinked calendar cards are clickable
        var onclick = '';
        if (linkingApaEventId && !isLinked) {
          onclick = ' onclick="doLink(\'' + SPM.esc(linkingApaEventId) + '\', \'' + SPM.esc(evt.calendarEventId) + '\')"';
        }

        html += '<div class="' + cardClass + '" data-cal-id="' + SPM.esc(evt.calendarEventId) + '"' + onclick + '>';

        // Linked badge
        if (isLinked) {
          html += '<span class="linked-badge">\u2713 Linked</span>';
        }

        // Title
        html += '<div class="eh-event-card-title">' + SPM.esc(evt.title || 'Untitled') + '</div>';

        // Meta: date, time, location
        html += '<div class="eh-event-card-meta">';
        if (evt.start) {
          html += '<div>' + SPM.esc(formatShortDate(evt.start));
          var timeRange = formatTimeRange(evt.start, evt.end);
          if (timeRange) html += ' &middot; ' + SPM.esc(timeRange);
          html += '</div>';
        }
        if (evt.location) {
          html += '<div>' + SPM.esc(evt.location) + '</div>';
        }
        html += '</div>'; // end meta

        html += '</div>'; // end card
      }

      container.innerHTML = html;
    }


    // ======================================================================
    // Render All Columns
    // ======================================================================

    /**
     * Renders all three columns using current data and filter values.
     */
    function renderAll() {
      var apaFilter = document.getElementById('filterApa').value;
      var calFilter = document.getElementById('filterCal').value;

      renderApaColumn(apaFilter);
      renderLinkedColumn();
      renderCalColumn(calFilter);

      // Update linking mode visual state on calendar column
      var colCal = document.getElementById('colCal');
      if (linkingApaEventId) {
        colCal.classList.add('linking-mode');
      } else {
        colCal.classList.remove('linking-mode');
      }

      // Update status text
      updateStatusText();
    }

    /**
     * Updates the status text in the top bar with counts.
     */
    function updateStatusText() {
      var needsUpdate = 0;
      for (var i = 0; i < linkedList.length; i++) {
        if (linkedList[i].needsUpdate) needsUpdate++;
      }
      var parts = [];
      parts.push(apaList.length + ' APA');
      parts.push(calList.length + ' calendar');
      parts.push(linkedList.length + ' linked');
      if (needsUpdate) parts.push(needsUpdate + ' need update');
      document.getElementById('statusText').textContent = parts.join(' \u00b7 ');
    }


    // ======================================================================
    // Linking Mode
    // ======================================================================

    /**
     * Enters linking mode: highlights the selected APA card, shows
     * the linking banner, and makes calendar cards clickable.
     *
     * @param {string} apaEventId - the APA event ID to link
     * @param {string} apaTitle - the APA event title (for the banner)
     */
    function enterLinkingMode(apaEventId, apaTitle) {
      linkingApaEventId = apaEventId;
      linkingApaTitle = apaTitle;

      // Show banner
      var banner = document.getElementById('linkBanner');
      document.getElementById('linkBannerText').textContent = 'Select a calendar event to link to "' + apaTitle + '"';
      banner.classList.add('active');

      // Re-render to apply selected state and clickable calendar cards
      renderAll();
    }

    /**
     * Exits linking mode: removes selection, hides banner, restores
     * normal calendar card behavior.
     */
    function exitLinkingMode() {
      linkingApaEventId = null;
      linkingApaTitle = '';

      // Hide banner
      document.getElementById('linkBanner').classList.remove('active');

      // Re-render to remove selected state
      renderAll();
    }


    // ======================================================================
    // Data Loading
    // ======================================================================

    /**
     * Fetches sync status from the API and renders all three columns.
     * Shows skeleton loaders during first load, status text on refresh.
     */
    function loadSyncStatus() {
      clearError();
      document.getElementById('statusText').textContent = 'Loading...';
      document.getElementById('refreshBtn').disabled = true;

      // Exit linking mode on refresh
      linkingApaEventId = null;
      linkingApaTitle = '';
      document.getElementById('linkBanner').classList.remove('active');

      SPM.callServer('getSyncStatus')
        .then(function(data) {
          if (data.error) {
            showError(data.error);
            document.getElementById('statusText').textContent = 'Error loading data.';
            return;
          }
          // API returns { syncItems: [...] }
          syncItems = data.syncItems || data.items || [];
          processSyncItems();
          renderAll();
        })
        .catch(function(err) {
          showError('Failed to load sync status: ' + err.message);
          document.getElementById('statusText').textContent = 'Error loading data.';
        })
        .finally(function() {
          document.getElementById('refreshBtn').disabled = false;
        });
    }


    // ======================================================================
    // Actions
    // ======================================================================

    /**
     * Creates a new Google Calendar event from an unlinked APA event.
     *
     * @param {string} apaEventId - the APA event ID to create from
     */
    function doCreate(apaEventId) {
      document.getElementById('statusText').textContent = 'Creating calendar event...';
      SPM.callServer('createCalendarEvent', { apaEventId: apaEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          showToast('Event created');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Create failed: ' + err.message);
        });
    }

    /**
     * Links an APA event to an existing Google Calendar event.
     * Called when user clicks a calendar card in linking mode.
     *
     * @param {string} apaEventId - the APA event ID
     * @param {string} calEventId - the Google Calendar event ID
     */
    function doLink(apaEventId, calEventId) {
      exitLinkingMode();
      document.getElementById('statusText').textContent = 'Linking events...';
      SPM.callServer('linkEvents', { apaEventId: apaEventId, calendarEventId: calEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          showToast('Events linked');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Link failed: ' + err.message);
        });
    }

    /**
     * Updates a linked Google Calendar event with current APA data.
     *
     * @param {string} calendarEventId - the calendar event ID to update
     * @param {string} apaEventId - the APA event ID with fresh data
     */
    function doUpdate(calendarEventId, apaEventId) {
      document.getElementById('statusText').textContent = 'Updating calendar event...';
      SPM.callServer('updateCalendarEvent', { calendarEventId: calendarEventId, apaEventId: apaEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          showToast('Event updated');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Update failed: ' + err.message);
        });
    }

    /**
     * Removes the link between an APA event and its Google Calendar event.
     * Does NOT delete the calendar event — just removes the association.
     *
     * @param {string} calendarEventId - the calendar event ID to unlink
     */
    function doUnlink(calendarEventId) {
      document.getElementById('statusText').textContent = 'Unlinking event...';
      SPM.callServer('unlinkEvent', { calendarEventId: calendarEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          showToast('Event unlinked');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Unlink failed: ' + err.message);
        });
    }


    // ======================================================================
    // Toast & Error
    // ======================================================================

    /**
     * Shows a brief success toast at the bottom of the screen.
     * Auto-hides after 2 seconds.
     *
     * @param {string} msg - message to display
     */
    function showToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(function() {
        el.classList.remove('show');
      }, 2000);
    }

    /**
     * Shows a red error banner below the toolbar.
     *
     * @param {string} msg - error message
     */
    function showError(msg) {
      var el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = '';
    }

    /**
     * Clears the error banner.
     */
    function clearError() {
      var el = document.getElementById('errorBanner');
      el.textContent = '';
      el.style.display = 'none';
    }


    // ======================================================================
    // Initialization
    // ======================================================================

    document.addEventListener('DOMContentLoaded', function() {

      // -- Auth gate: check for admin token --
      var token = (window.SPM_CONFIG || {}).adminToken;
      if (!token) {
        document.getElementById('authError').style.display = '';
        document.getElementById('mainContent').style.display = 'none';
        return;
      }

      // Token present — show main content
      document.getElementById('authError').style.display = 'none';
      var main = document.getElementById('mainContent');
      main.style.display = 'flex';

      // -- Wire up refresh button --
      document.getElementById('refreshBtn').addEventListener('click', function() {
        loadSyncStatus();
      });

      // -- Wire up filter inputs --
      document.getElementById('filterApa').addEventListener('input', function() {
        renderApaColumn(this.value);
      });
      document.getElementById('filterCal').addEventListener('input', function() {
        renderCalColumn(this.value);
      });

      // -- Wire up linking mode cancel --
      document.getElementById('linkBannerCancel').addEventListener('click', function() {
        exitLinkingMode();
      });

      // -- Escape key exits linking mode --
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && linkingApaEventId) {
          exitLinkingMode();
        }
      });

      // -- Initial load --
      loadSyncStatus();
    });
  </script>

</body>
</html>
