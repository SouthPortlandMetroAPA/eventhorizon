<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  ============================================================================
  EventHorizon - index.html (Standalone / GitHub Pages)
  ============================================================================

  PURPOSE:
    Three-column admin dashboard for EventHorizon calendar sync. Desktop only.
    Left: APA events (poolplayers.com). Center: linked pairs. Right: Google
    Calendar events. Supports create, link, update, unlink, ignore, and
    scan-for-changes actions.

  AUTHENTICATION:
    Admin token from URL query param: ?admin=<token>
    If missing, shows lock icon and blocks all UI.
    Token auto-injected into every API call via SPM.callServer.

  ARCHITECTURE:
    Standalone build — NO GAS runtime dependency.
    Uses spm-core.js for fetch() POST to Cloudflare Worker
    (eventhorizon.spmapa.workers.dev) → GAS doPost.

  API ROUTES (via SPM.callServer):
    getSyncStatus        — returns { syncItems[] } with sync comparison data
    createCalendarEvent  — creates Google Calendar event(s) from APA event
                           returns { created: N, calendarEventIds: [...] }
    batchLinkEvents      — links multiple calendar events to one APA event
                           + optionally updates fields (title/location/desc)
    updateCalendarEvent  — updates linked calendar event with APA data
    unlinkEvent          — removes link between APA and calendar events
    linkEvents           — links one APA event to one calendar event (used
                           internally by batchLinkEvents)
    getIgnoredEvents     — returns { ignoredIds: string[] }
    ignoreApaEvent       — params: { apaEventId } → returns { ignoredIds }
    unignoreApaEvent     — params: { apaEventId } → returns { ignoredIds }
    scanForChanges       — returns { changes: [...], totalChanges }
    applyAllChanges      — params: { changes: [...] } → returns { updated, errors[] }

  SYNC ITEM SHAPE (from getSyncStatus):
    status:       'linked' | 'unlinked' | 'calendar_only'
    needsUpdate:  boolean (only on linked items)
    diffs:        string[] (field names that differ, only on linked items)
    apaEvent:     { apaEventId, title, start, end, organizer, email,
                    description, location: { name, address, city, zip } }
    calendarEvent:{ calendarEventId, apaEventId, title, start, end,
                    location (string), description, isAllDay }

  THREE-COLUMN LAYOUT:
    Left:   APA Events — deduplicated by apaEventId. Linked ones faded.
            Ignored ones show muted style with strikethrough + badge.
    Center: Linked groups — linked items grouped by apaEventId (1:many).
    Right:  Calendar Events — all items with calendarEvent. Linked ones faded.

  LINKING FLOW (multi-select checkbox mode):
    1. User clicks "Link ▸" on an APA event card
    2. APA card gets blue selected border, banner appears at top
    3. Calendar column switches to checkbox mode:
       - Unlinked cards get checkboxes (unchecked by default)
       - Linked/faded cards stay faded, no checkbox
       - Clicking a card toggles its checkbox
       - Selected cards get a blue left border
    4. Sticky "Link Selected (N)" button at bottom of calendar column
    5. Clicking "Link Selected" opens field preview modal
    6. Modal shows which fields (title/location/description) to copy
    7. "Link & Update" calls batchLinkEvents API
    8. Cancel or Escape exits linking mode

  FILTER TOGGLES:
    - "Hide Linked" on APA + Calendar columns: hides faded/linked cards
    - "Hide Ignored" on APA column: hides ignored cards (ON by default)
    - All toggle states are ephemeral — reset on page refresh

  DESKTOP ONLY:
    No mobile/tablet responsive code. No device detection.

  BRANDING:
    --spm-primary: #ea002a (red), --spm-accent: #0031a1 (blue)
    Shared spm-base.css for card, button, badge, header classes.

  ============================================================================
  -->
  <title>EventHorizon — South Portland Metro APA</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://southportlandmetroapa.github.io/shared/spm-base.css">
  <style>
    /* ==================================================================
       App-Specific CSS — EventHorizon Three-Column Dashboard
       ==================================================================
       Desktop-only admin tool. CSS Grid three-column layout.
       Extends spm-base.css shared classes.
       ================================================================== */

    /* -- Auth error page ------------------------------------------------ */
    .auth-error {
      text-align: center;
      padding: 48px 24px;
    }
    .auth-error-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .auth-error-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .auth-error-msg {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* -- Header extras -------------------------------------------------- */
    .spm-header .header-tag {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* -- Top bar (refresh + status) ------------------------------------- */
    .eh-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 0;
    }
    .eh-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .eh-refresh-btn {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 40px;
    }
    .eh-refresh-btn:hover {
      background: var(--bg);
    }
    .eh-refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .eh-topbar-status {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* -- Error banner --------------------------------------------------- */
    .eh-error-banner {
      background: #fef2f2;
      border: 1px solid var(--spm-primary);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 0 16px 12px;
      color: #991b1b;
      font-size: 0.875rem;
      font-weight: 600;
      display: none;
    }

    /* -- Linking mode banner -------------------------------------------- */
    .eh-link-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px;
      margin: 0 16px 8px;
      background: #eff6ff;
      border: 2px solid var(--spm-accent);
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1e40af;
    }
    .eh-link-banner.active {
      display: flex;
    }
    .eh-link-banner-cancel {
      padding: 4px 16px;
      border: 1px solid #3b82f6;
      border-radius: 999px;
      background: #fff;
      color: #1d4ed8;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 32px;
    }
    .eh-link-banner-cancel:hover {
      background: #dbeafe;
    }

    /* -- Three-column grid ---------------------------------------------- */
    .eh-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 0;
      height: calc(100svh - 160px);
      min-height: 400px;
    }

    /* -- Column --------------------------------------------------------- */
    .eh-col {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .eh-col:last-child {
      border-right: none;
    }
    .eh-col-header {
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .eh-col-header-count {
      font-size: 0.8125rem;
      font-weight: 800;
      background: rgba(255,255,255,0.25);
      padding: 2px 10px;
      border-radius: 999px;
    }

    /* Column header colors */
    .eh-col--apa .eh-col-header {
      background: var(--spm-primary);
    }
    .eh-col--linked .eh-col-header {
      background: #166534;
    }
    .eh-col--cal .eh-col-header {
      background: var(--spm-accent);
    }

    /* Column filter input + toggle area */
    .eh-col-filter {
      padding: 8px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .eh-col-filter input {
      width: 100%;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8125rem;
      font-family: inherit;
      min-height: 32px;
    }
    .eh-col-filter input:focus {
      outline: 2px solid var(--spm-accent);
      outline-offset: -2px;
    }

    /* Filter toggle buttons row (below filter input) */
    .eh-col-toggles {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    /* Pill toggle button — outline when inactive, filled when active */
    .eh-toggle-btn {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      min-height: 24px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      /* Inactive (outline) state */
      background: #fff;
      color: #6b7280;
      border: 1px solid var(--border);
    }
    .eh-toggle-btn:hover {
      background: #f3f4f6;
    }
    /* Active (filled) state */
    .eh-toggle-btn.active {
      background: #374151;
      color: #fff;
      border-color: #374151;
    }
    .eh-toggle-btn.active:hover {
      background: #4b5563;
      border-color: #4b5563;
    }

    /* Column scrollable body */
    .eh-col-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      background: var(--bg);
    }

    /* -- Event card (used in left and right columns) -------------------- */
    .eh-event-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s, opacity 0.15s, box-shadow 0.15s;
    }
    .eh-event-card-title {
      font-weight: 700;
      font-size: 0.875rem;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .eh-event-card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .eh-event-card-meta div {
      margin-bottom: 2px;
    }
    .eh-event-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .eh-event-card-actions button {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 28px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .eh-btn-create {
      background: var(--spm-primary);
      color: #fff;
      border: none;
    }
    .eh-btn-create:hover {
      background: #c40023;
    }
    .eh-btn-link {
      background: #fff;
      color: var(--spm-accent);
      border: 1px solid var(--spm-accent);
    }
    .eh-btn-link:hover {
      background: #eff6ff;
    }

    /* Ignore / Unignore button — subtle grey */
    .eh-btn-ignore {
      background: #fff;
      color: #6b7280;
      border: 1px solid var(--border);
    }
    .eh-btn-ignore:hover {
      background: #f3f4f6;
    }

    /* Linked/muted card state (in left/right columns) */
    .eh-event-card.is-linked {
      opacity: 0.5;
    }
    .eh-event-card .linked-badge {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #166534;
      background: #dcfce7;
      padding: 1px 8px;
      border-radius: 999px;
      margin-bottom: 4px;
    }

    /* Ignored card state (APA column only) — muted with strikethrough */
    .eh-event-card.is-ignored {
      opacity: 0.45;
    }
    .eh-event-card.is-ignored .eh-event-card-title {
      text-decoration: line-through;
      color: var(--muted);
    }
    .eh-event-card .ignored-badge {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #6b7280;
      background: #e5e7eb;
      padding: 1px 8px;
      border-radius: 999px;
      margin-bottom: 4px;
    }

    /* Selected card (linking mode — the APA card being linked) */
    .eh-event-card.is-selected {
      border-color: var(--spm-accent);
      box-shadow: 0 0 0 2px rgba(0, 49, 161, 0.2);
      opacity: 1;
    }

    /* -- Checkbox mode for calendar cards during linking ----------------- */

    /* In linking mode, unlinked calendar cards are clickable */
    .eh-col--cal.linking-mode .eh-event-card:not(.is-linked) {
      cursor: pointer;
    }
    .eh-col--cal.linking-mode .eh-event-card:not(.is-linked):hover {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
      background: #f0f7ff;
    }

    /* Calendar card checkbox (shown only in linking mode) */
    .eh-cal-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .eh-cal-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--spm-accent);
    }
    .eh-cal-checkbox-content {
      flex: 1;
      min-width: 0;
    }

    /* Calendar card selected via checkbox — blue left border */
    .eh-event-card.is-check-selected {
      border-left: 4px solid var(--spm-accent);
      background: #f8faff;
    }

    /* Sticky "Link Selected" button at bottom of calendar column */
    .eh-link-selected-bar {
      display: none;
      padding: 8px 12px;
      background: var(--card);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .eh-link-selected-bar.active {
      display: block;
    }
    .eh-btn-link-selected {
      width: 100%;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
      font-family: inherit;
      background: var(--spm-accent);
      color: #fff;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .eh-btn-link-selected:hover:not(:disabled) {
      background: #002480;
    }
    .eh-btn-link-selected:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* -- Linked group card (center column, 1:many) ---------------------- */
    .eh-pair-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .eh-pair-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .eh-pair-card-title {
      font-weight: 700;
      font-size: 0.875rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .eh-pair-badge-linked {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #166534;
      background: #dcfce7;
      padding: 1px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .eh-pair-badge-update {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 700;
      color: #9a3412;
      background: #ffedd5;
      padding: 1px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    /* APA source info inside group card */
    .eh-group-apa-label {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .eh-group-apa-title {
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .eh-group-apa-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Linked-to label */
    .eh-group-linked-label {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .eh-group-linked-label .arrow {
      font-size: 0.875rem;
      color: #166534;
    }

    /* Calendar event list inside group card */
    .eh-group-cal-list {
      list-style: none;
      margin: 0 0 8px 0;
      padding: 0;
    }
    .eh-group-cal-list li {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-left: 3px solid var(--spm-accent);
      margin-bottom: 4px;
      background: var(--bg);
      border-radius: 0 4px 4px 0;
      line-height: 1.4;
    }

    /* Pair card actions (center column) */
    .eh-pair-actions {
      display: flex;
      gap: 8px;
    }
    .eh-pair-actions button {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 28px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .eh-btn-update {
      background: #f97316;
      color: #fff;
      border: none;
    }
    .eh-btn-update:hover {
      background: #ea580c;
    }
    .eh-btn-unlink {
      background: #fff;
      color: #6b7280;
      border: 1px solid var(--border);
    }
    .eh-btn-unlink:hover {
      background: #f3f4f6;
    }

    /* -- Field preview modal (shown before batchLink) ------------------- */
    .eh-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9000;
      align-items: center;
      justify-content: center;
    }
    .eh-modal-overlay.active {
      display: flex;
    }
    .eh-modal {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      max-height: 80vh;
      overflow-y: auto;
    }
    .eh-modal-title {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .eh-modal-section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .eh-modal-field {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .eh-modal-field:last-of-type {
      border-bottom: none;
    }
    .eh-modal-field input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--spm-accent);
    }
    .eh-modal-field-label {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 80px;
      flex-shrink: 0;
    }
    .eh-modal-field-value {
      font-size: 0.8125rem;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .eh-modal-field-value.is-empty {
      color: var(--muted);
      font-style: italic;
    }
    .eh-modal-note {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .eh-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
    .eh-modal-actions button {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 40px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .eh-modal-btn-cancel {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .eh-modal-btn-cancel:hover {
      background: var(--bg);
    }
    .eh-modal-btn-confirm {
      background: var(--spm-accent);
      color: #fff;
      border: none;
    }
    .eh-modal-btn-confirm:hover {
      background: #002480;
    }

    /* -- Scan Changes modal — wider for diff table ---------------------- */
    .eh-modal.eh-modal--wide {
      max-width: 680px;
    }
    .eh-changes-group {
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .eh-changes-group-title {
      font-size: 0.875rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .eh-changes-group-count {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
    }
    .eh-changes-diff {
      font-size: 0.8125rem;
      padding: 4px 0;
      line-height: 1.5;
    }
    .eh-changes-diff-field {
      font-weight: 700;
      color: var(--muted);
      min-width: 80px;
      display: inline-block;
    }
    .eh-changes-diff-old {
      color: #991b1b;
      text-decoration: line-through;
    }
    .eh-changes-diff-new {
      color: #166534;
    }

    /* -- Skeleton loaders ----------------------------------------------- */
    .eh-skeleton {
      background: linear-gradient(90deg, #e5e5e5 25%, #f0f0f0 50%, #e5e5e5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      height: 72px;
      margin-bottom: 8px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* -- Toast ---------------------------------------------------------- */
    .eh-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #166534;
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .eh-toast.show {
      opacity: 1;
    }

    /* -- Empty state ---------------------------------------------------- */
    .eh-empty {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 0.8125rem;
    }

    /* -- Fullpage layout (no spm-page max-width constraint) ------------- */
    body {
      margin: 0;
    }
    .eh-page {
      display: flex;
      flex-direction: column;
      height: 100svh;
      overflow: hidden;
    }
    .eh-page .spm-header {
      flex-shrink: 0;
    }
  </style>
</head>
<body>

          <!-- Sticky "Link Selected" bar (only visible in linking mode) -->

  </div><!-- end eh-page -->

  <!-- ================================================================== -->
  <!-- Toast -->
  <!-- ================================================================== -->
  <div class="eh-toast" id="toast"></div>

  <!-- ================================================================== -->
  <!-- Field Preview Modal / Changes Modal (shared overlay) -->
  <!-- ================================================================== -->
  <div class="eh-modal-overlay" id="modalOverlay">
    <div class="eh-modal" id="modalContent">
      <!-- Populated dynamically by showFieldPreviewModal() or showChangesModal() -->
    </div>
  </div>

  <!-- ================================================================== -->
  <!-- Scripts -->
  <!-- ================================================================== -->

  <!-- SPM_CONFIG must be set BEFORE spm-core.js loads -->
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('admin') || '';
      window.SPM_CONFIG = {
        apiUrl: 'https://eventhorizon.spmapa.workers.dev',
        contentType: 'text/plain',
        adminToken: token
      };
    })();
  </script>
  <script src="https://southportlandmetroapa.github.io/shared/spm-core.js"></script>

  <script>
    // ======================================================================
    // EventHorizon — Three-Column Sync Dashboard
    // ======================================================================
    //
    // Desktop-only admin dashboard. Three independently scrollable columns:
    //   Left:   APA events (deduplicated by apaEventId)
    //   Center: Linked groups (linked items grouped by apaEventId, 1:many)
    //   Right:  Calendar events (all items with calendarEvent)
    //
    // DEPENDENCIES:
    //   - spm-core.js: SPM.esc(), SPM.callServer(), SPM.setStatus()
    //   - spm-base.css: card, button, badge, header classes
    //
    // DATA FLOW:
    //   1. On load -> getSyncStatus + getIgnoredEvents (parallel)
    //      -> split into 3 lists -> render columns
    //   2. User action -> create / batchLink / update / unlink / ignore /
    //      scanForChanges / applyAllChanges API call
    //   3. After action -> toast + full refresh (getSyncStatus again)
    //
    // LINKING FLOW (multi-select checkbox mode):
    //   1. User clicks "Link >" on APA card -> enters linking mode
    //   2. Banner shown, calendar cards get checkboxes
    //   3. User checks desired calendar events
    //   4. Click "Link Selected (N)" -> field preview modal
    //   5. Confirm in modal -> batchLinkEvents API -> refresh
    //   6. Cancel exits linking mode
    //
    // FILTER TOGGLES:
    //   - hideLinkedApa / hideLinkedCal: hide is-linked cards in L/R columns
    //   - hideIgnored: hide ignored APA cards (default: ON)
    //   - All ephemeral — reset on refresh
    //
    // ======================================================================


    // -- Module state -------------------------------------------------------

    /** Raw syncItems array from the last getSyncStatus call */
    var syncItems = [];

    /** Derived lists for the three columns */
    var apaList = [];       // Deduplicated APA events (one per apaEventId)
    var linkedGroups = [];  // Grouped linked items: { apaEvent, calEvents[] }
    var calList = [];       // All items with calendarEvent (linked + calendar_only)

    /** Set of linked apaEventIds for quick lookup */
    var linkedApaIds = {};

    /** Set of linked calendarEventIds for quick lookup */
    var linkedCalIds = {};

    /** Linking mode state: the apaEventId being linked, or null */
    var linkingApaEventId = null;

    /** Linking mode: the full APA event object (for modal display) */
    var linkingApaEvent = null;

    /** Linking mode: the APA event title (for the banner) */
    var linkingApaTitle = '';

    /** Linking mode: set of checked calendarEventIds */
    var checkedCalIds = {};

    /** Set of ignored APA event IDs. Loaded from getIgnoredEvents on init. */
    var ignoredApaIds = new Set();

    /** Filter toggle states (ephemeral, reset on page refresh) */
    var hideLinkedApa = false;
    var hideLinkedCal = false;
    var hideIgnored = true;  // Default: hide ignored events


    // ======================================================================
    // Date Formatting
    // ======================================================================

    /**
     * Formats an ISO date string (YYYY-MM-DD or full ISO) as "Saturday, March 28".
     * Uses the browser's Intl.DateTimeFormat for locale-aware day/month names.
     *
     * @param {string} dateStr - ISO date string, e.g. "2026-03-28"
     * @returns {string} formatted date, e.g. "Saturday, March 28"
     */
    function formatDate(dateStr) {
      if (!dateStr) return '';
      // Handle full ISO datetime (2026-03-28T09:00:00-07:00) or date-only (2026-03-28)
      var datePart = dateStr.split('T')[0];
      var parts = datePart.split('-');
      if (parts.length < 3) return dateStr;
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      return d.toLocaleDateString('en-US', {
        weekday: 'long',
        month: 'long',
        day: 'numeric'
      });
    }

    /**
     * Formats a short date for card display: "Mar 28" (no weekday).
     *
     * @param {string} dateStr - ISO date string
     * @returns {string} e.g. "Mar 28"
     */
    function formatShortDate(dateStr) {
      if (!dateStr) return '';
      var datePart = dateStr.split('T')[0];
      var parts = datePart.split('-');
      if (parts.length < 3) return dateStr;
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      return d.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric'
      });
    }

    /**
     * Formats a short date with day name for linked group display: "Nov 4".
     *
     * @param {string} dateStr - ISO date string
     * @returns {string} e.g. "Nov 4"
     */
    function formatShortDateWithTime(dateStr, endStr) {
      var date = formatShortDate(dateStr);
      var time = formatTimeRange(dateStr, endStr);
      if (date && time) return date + ', ' + time;
      return date || '';
    }

    /**
     * Formats a time string for display. Expects HH:MM (24h) or already
     * formatted strings. Converts to 12-hour format with AM/PM.
     *
     * @param {string} timeStr - e.g. "09:00" or "17:00"
     * @returns {string} e.g. "9:00 AM"
     */
    function formatTime(timeStr) {
      if (!timeStr) return '';
      // If already has AM/PM, return as-is
      if (/[AaPp][Mm]/.test(timeStr)) return timeStr;
      var parts = timeStr.split(':');
      var h = parseInt(parts[0], 10);
      var m = parts[1] || '00';
      var ampm = h >= 12 ? 'PM' : 'AM';
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;
      return h + ':' + m + ' ' + ampm;
    }

    /**
     * Formats a time range for display.
     *
     * @param {string} start - start time, e.g. "09:00" or ISO datetime
     * @param {string} end   - end time, e.g. "17:00" or ISO datetime
     * @returns {string} e.g. "9:00 AM – 5:00 PM" or single time if no end
     */
    function formatTimeRange(start, end) {
      var startTime = extractTime(start);
      var endTime = extractTime(end);
      var s = formatTime(startTime);
      var e = formatTime(endTime);
      if (s && e) return s + ' \u2013 ' + e;
      return s || e || '';
    }

    /**
     * Extract HH:MM from an ISO datetime string or return '' if date-only.
     *
     * @param {string} str - ISO datetime or time string
     * @returns {string} "HH:MM" or ""
     */
    function extractTime(str) {
      if (!str) return '';
      // Date-only strings (all-day events) have no 'T'
      if (str.indexOf('T') === -1) return '';
      // "2026-03-28T09:00:00-07:00" -> "09:00"
      var timePart = str.split('T')[1];
      if (!timePart) return '';
      return timePart.substring(0, 5);
    }

    /**
     * Calculates the number of days an event spans.
     * Returns 1 for single-day events, N for multi-day.
     *
     * @param {string} startStr - ISO date/datetime string
     * @param {string} endStr - ISO date/datetime string
     * @returns {number} number of days
     */
    function getEventDayCount(startStr, endStr) {
      if (!startStr || !endStr) return 1;
      var startDate = startStr.split('T')[0];
      var endDate = endStr.split('T')[0];
      if (startDate === endDate) return 1;
      var sParts = startDate.split('-');
      var eParts = endDate.split('-');
      var s = new Date(parseInt(sParts[0], 10), parseInt(sParts[1], 10) - 1, parseInt(sParts[2], 10));
      var e = new Date(parseInt(eParts[0], 10), parseInt(eParts[1], 10) - 1, parseInt(eParts[2], 10));
      var diff = Math.round((e - s) / (1000 * 60 * 60 * 24));
      return Math.max(1, diff + 1);
    }


    // ======================================================================
    // Location Formatting
    // ======================================================================

    /**
     * Formats a location for display. APA events have location as an object
     * { name, address, city, zip }. Calendar events have location as a string.
     *
     * @param {string|Object} loc - location data
     * @returns {string} formatted location string
     */
    function formatLocation(loc) {
      if (!loc) return '';
      if (typeof loc === 'string') return loc;
      // Object: { name, address, city, zip }
      return [loc.name, loc.address, loc.city, loc.zip].filter(Boolean).join(', ');
    }


    // ======================================================================
    // Data Processing
    // ======================================================================

    /**
     * Splits raw syncItems into the three column lists and builds lookup
     * sets for linked IDs. Called after each getSyncStatus response.
     *
     * Key behavior:
     *   - APA list is deduplicated by apaEventId (multiple linked items
     *     for the same APA event are merged into one entry).
     *   - Linked items are GROUPED by apaEventId into linkedGroups[],
     *     where each group has one apaEvent and N calendarEvents.
     *   - Calendar list includes all items with a calendarEvent.
     */
    function processSyncItems() {
      apaList = [];
      linkedGroups = [];
      calList = [];
      linkedApaIds = {};
      linkedCalIds = {};

      // Temporary maps for deduplication and grouping
      var apaSeenIds = {};      // apaEventId -> true (for dedup)
      var linkedGroupMap = {};  // apaEventId -> { apaEvent, calEvents[], needsUpdate, diffs[] }

      for (var i = 0; i < syncItems.length; i++) {
        var item = syncItems[i];

        // Build linked ID lookup sets and group linked items
        if (item.status === 'linked' && item.apaEvent && item.calendarEvent) {
          linkedApaIds[item.apaEvent.apaEventId] = true;
          linkedCalIds[item.calendarEvent.calendarEventId] = true;

          var groupKey = item.apaEvent.apaEventId;
          if (!linkedGroupMap[groupKey]) {
            linkedGroupMap[groupKey] = {
              apaEvent: item.apaEvent,
              calEvents: [],
              needsUpdate: false,
              diffs: []
            };
          }
          linkedGroupMap[groupKey].calEvents.push(item.calendarEvent);
          // If any linked item needs update, the group needs update
          if (item.needsUpdate) {
            linkedGroupMap[groupKey].needsUpdate = true;
            // Merge diffs (union of all diff fields)
            var existingDiffs = linkedGroupMap[groupKey].diffs;
            var newDiffs = item.diffs || [];
            for (var d = 0; d < newDiffs.length; d++) {
              if (existingDiffs.indexOf(newDiffs[d]) === -1) {
                existingDiffs.push(newDiffs[d]);
              }
            }
          }
        }

        // Left column: deduplicated APA events
        if (item.apaEvent && !apaSeenIds[item.apaEvent.apaEventId]) {
          apaSeenIds[item.apaEvent.apaEventId] = true;
          apaList.push(item);
        }

        // Right column: all items that have a calendarEvent
        if (item.calendarEvent) {
          calList.push(item);
        }
      }

      // Convert linkedGroupMap to sorted array
      for (var key in linkedGroupMap) {
        if (linkedGroupMap.hasOwnProperty(key)) {
          linkedGroups.push(linkedGroupMap[key]);
        }
      }

      // Sort each list by date ascending
      var dateSorter = function(a, b) {
        var da = (a.apaEvent && a.apaEvent.start) || (a.calendarEvent && a.calendarEvent.start) || '';
        var db = (b.apaEvent && b.apaEvent.start) || (b.calendarEvent && b.calendarEvent.start) || '';
        return da.localeCompare(db);
      };
      apaList.sort(dateSorter);
      calList.sort(dateSorter);

      // Sort linked groups by APA event start date
      linkedGroups.sort(function(a, b) {
        var da = (a.apaEvent && a.apaEvent.start) || '';
        var db = (b.apaEvent && b.apaEvent.start) || '';
        return da.localeCompare(db);
      });
    }


    // ======================================================================
    // Rendering — Left Column (APA Events)
    // ======================================================================

    /**
     * Renders the APA events column. Unlinked events get action buttons
     * (Create New, Link >, Ignore). Linked events are faded with a
     * "Linked" badge. Ignored events show muted style with strikethrough
     * title and "IGNORED" badge, plus an "Unignore" button.
     *
     * Multi-day APA events show "Create New (N days)" instead of "Create New".
     *
     * Filter toggles hideLinkedApa and hideIgnored control card visibility.
     *
     * @param {string} filter - search filter (case-insensitive)
     */
    function renderApaColumn(filter) {
      var container = document.getElementById('listApa');
      var lower = (filter || '').toLowerCase();

      var filtered = apaList.filter(function(item) {
        if (!lower) return true;
        var evt = item.apaEvent;
        var haystack = ((evt.title || '') + ' ' + formatLocation(evt.location) + ' ' + (evt.organizer || '') + ' ' + formatDate(evt.start)).toLowerCase();
        return haystack.indexOf(lower) !== -1;
      });

      document.getElementById('countApa').textContent = apaList.length;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="eh-empty">' + (lower ? 'No matching APA events.' : 'No APA events found.') + '</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var evt = item.apaEvent;
        var isLinked = !!linkedApaIds[evt.apaEventId];
        var isIgnored = ignoredApaIds.has(evt.apaEventId);
        var isSelected = (linkingApaEventId === evt.apaEventId);

        // Hide Linked toggle: skip linked cards when active
        if (hideLinkedApa && isLinked && !isSelected) continue;

        // Hide Ignored toggle: skip ignored cards when active
        // (ignored state only applies to unlinked events)
        if (hideIgnored && isIgnored && !isLinked) continue;

        var cardClass = 'eh-event-card';
        if (isLinked && !isSelected) cardClass += ' is-linked';
        if (isIgnored && !isLinked) cardClass += ' is-ignored';
        if (isSelected) cardClass += ' is-selected';

        html += '<div class="' + cardClass + '" data-apa-id="' + SPM.esc(evt.apaEventId) + '">';

        // Linked badge (for linked cards)
        if (isLinked) {
          html += '<span class="linked-badge">\u2713 Linked</span>';
        }

        // Ignored badge (for ignored unlinked cards)
        if (isIgnored && !isLinked) {
          html += '<span class="ignored-badge">IGNORED</span>';
        }

        // Title
        html += '<div class="eh-event-card-title">' + SPM.esc(evt.title || 'Untitled') + '</div>';

        // Meta: date, time, location, organizer
        html += '<div class="eh-event-card-meta">';
        if (evt.start) {
          html += '<div>' + SPM.esc(formatShortDate(evt.start));
          // Show end date if multi-day
          if (evt.end) {
            var dayCount = getEventDayCount(evt.start, evt.end);
            if (dayCount > 1) {
              html += ' \u2013 ' + SPM.esc(formatShortDate(evt.end));
            }
          }
          var timeRange = formatTimeRange(evt.start, evt.end);
          if (timeRange) html += ' &middot; ' + SPM.esc(timeRange);
          html += '</div>';
        }
        var loc = formatLocation(evt.location);
        if (loc) {
          html += '<div>' + SPM.esc(loc) + '</div>';
        }
        if (evt.organizer) {
          html += '<div>' + SPM.esc(evt.organizer) + '</div>';
        }
        html += '</div>'; // end meta

        // Action buttons
        if (!isLinked) {
          html += '<div class="eh-event-card-actions">';

          if (isIgnored) {
            // Ignored event: show Unignore button only
            html += '<button class="eh-btn-ignore" onclick="doUnignore(\'' + SPM.esc(evt.apaEventId) + '\')">Unignore</button>';
          } else {
            // Normal unlinked: Create New + Link > + Ignore
            var dayCount = getEventDayCount(evt.start, evt.end);
            var createLabel = dayCount > 1 ? 'Create New (' + dayCount + ' days)' : 'Create New';
            html += '<button class="eh-btn-create" onclick="doCreate(\'' + SPM.esc(evt.apaEventId) + '\', ' + dayCount + ')">' + SPM.esc(createLabel) + '</button>';
            html += '<button class="eh-btn-link" onclick="enterLinkingMode(\'' + SPM.esc(evt.apaEventId) + '\')">Link \u25b8</button>';
            html += '<button class="eh-btn-ignore" onclick="doIgnore(\'' + SPM.esc(evt.apaEventId) + '\')">Ignore</button>';
          }

          html += '</div>';
        }

        html += '</div>'; // end card
      }

      container.innerHTML = html;
    }


    // ======================================================================
    // Rendering — Center Column (Linked Groups, 1:many)
    // ======================================================================

    /**
     * Renders the linked groups column. Each card represents one APA event
     * linked to one or more calendar events. Shows APA title/meta at top,
     * then a list of linked calendar event date/times.
     *
     * Single-link groups show Update + Unlink.
     * Multi-link groups show Update All + Unlink All.
     */
    function renderLinkedColumn() {
      var container = document.getElementById('listLinked');

      // Count total linked calendar events for the header badge
      var totalLinked = 0;
      for (var g = 0; g < linkedGroups.length; g++) {
        totalLinked += linkedGroups[g].calEvents.length;
      }
      document.getElementById('countLinked').textContent = totalLinked;

      // Show/hide global Unlink All button
      var unlinkAllBtn = document.getElementById('unlinkAllBtn');
      unlinkAllBtn.style.display = totalLinked > 0 ? '' : 'none';
      unlinkAllBtn.disabled = false;

      if (linkedGroups.length === 0) {
        container.innerHTML = '<div class="eh-empty">No linked events yet.</div>';
        return;
      }

      // Sort: needsUpdate first
      var sorted = linkedGroups.slice().sort(function(a, b) {
        if (a.needsUpdate && !b.needsUpdate) return -1;
        if (!a.needsUpdate && b.needsUpdate) return 1;
        return 0;
      });

      var html = '';
      for (var i = 0; i < sorted.length; i++) {
        var group = sorted[i];
        var apa = group.apaEvent;
        var calEvents = group.calEvents;
        var isMulti = calEvents.length > 1;

        html += '<div class="eh-pair-card">';

        // Header: title + badge
        html += '<div class="eh-pair-card-header">';
        html += '<div class="eh-pair-card-title">' + SPM.esc(apa.title || 'Untitled') + '</div>';
        if (group.needsUpdate) {
          html += '<span class="eh-pair-badge-update">Needs Update</span>';
        } else {
          html += '<span class="eh-pair-badge-linked">Linked</span>';
        }
        html += '</div>';

        // APA source info
        html += '<div class="eh-group-apa-label">APA Event</div>';
        html += '<div class="eh-group-apa-meta">';
        var apaLoc = formatLocation(apa.location);
        if (apaLoc) html += '<div>' + SPM.esc(apaLoc) + '</div>';
        if (apa.organizer) html += '<div>' + SPM.esc(apa.organizer) + '</div>';
        html += '</div>';

        // Linked calendar events list
        html += '<div class="eh-group-linked-label">';
        html += '<span class="arrow">\u2193</span> linked to ' + calEvents.length + ' calendar event' + (isMulti ? 's' : '') + ':';
        html += '</div>';

        // Sort calEvents by start date
        var sortedCals = calEvents.slice().sort(function(a, b) {
          return (a.start || '').localeCompare(b.start || '');
        });

        html += '<ul class="eh-group-cal-list">';
        for (var c = 0; c < sortedCals.length; c++) {
          var cal = sortedCals[c];
          html += '<li>' + SPM.esc(formatShortDateWithTime(cal.start, cal.end)) + '</li>';
        }
        html += '</ul>';

        // Actions
        html += '<div class="eh-pair-actions">';
        if (isMulti) {
          // Multi-link: Update All / Unlink All
          html += '<button class="eh-btn-update" onclick="doUpdateAll(\'' + SPM.esc(apa.apaEventId) + '\')">Update All</button>';
          html += '<button class="eh-btn-unlink" onclick="doUnlinkAll(\'' + SPM.esc(apa.apaEventId) + '\')">Unlink All</button>';
        } else {
          // Single link: Update / Unlink
          var singleCal = sortedCals[0];
          if (group.needsUpdate) {
            html += '<button class="eh-btn-update" onclick="doUpdate(\'' + SPM.esc(singleCal.calendarEventId) + '\', \'' + SPM.esc(apa.apaEventId) + '\')">Update</button>';
          }
          html += '<button class="eh-btn-unlink" onclick="doUnlink(\'' + SPM.esc(singleCal.calendarEventId) + '\')">Unlink</button>';
        }
        html += '</div>';

        html += '</div>'; // end pair card
      }

      container.innerHTML = html;
    }


    // ======================================================================
    // Rendering — Right Column (Calendar Events)
    // ======================================================================

    /**
     * Renders the Google Calendar events column. Linked events are faded.
     * In linking mode, unlinked cards get checkboxes for multi-select.
     *
     * Filter toggle hideLinkedCal controls linked card visibility.
     *
     * @param {string} filter - search filter (case-insensitive)
     */
    function renderCalColumn(filter) {
      var container = document.getElementById('listCal');
      var lower = (filter || '').toLowerCase();

      var filtered = calList.filter(function(item) {
        if (!lower) return true;
        var evt = item.calendarEvent;
        var haystack = ((evt.title || '') + ' ' + (evt.location || '') + ' ' + formatDate(evt.start)).toLowerCase();
        return haystack.indexOf(lower) !== -1;
      });

      document.getElementById('countCal').textContent = calList.length;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="eh-empty">' + (lower ? 'No matching calendar events.' : 'No calendar events found.') + '</div>';
        return;
      }

      var inLinkingMode = !!linkingApaEventId;
      var html = '';

      for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var evt = item.calendarEvent;
        var isLinked = !!linkedCalIds[evt.calendarEventId];
        var isChecked = !!checkedCalIds[evt.calendarEventId];

        // Hide Linked toggle: skip linked cards when active
        if (hideLinkedCal && isLinked) continue;

        var cardClass = 'eh-event-card';
        if (isLinked) cardClass += ' is-linked';
        if (isChecked) cardClass += ' is-check-selected';

        // In linking mode, unlinked cards are clickable to toggle checkbox
        var onclick = '';
        if (inLinkingMode && !isLinked) {
          onclick = ' onclick="toggleCalCheckbox(\'' + SPM.esc(evt.calendarEventId) + '\')"';
        }

        html += '<div class="' + cardClass + '" data-cal-id="' + SPM.esc(evt.calendarEventId) + '"' + onclick + '>';

        // Checkbox mode: show checkbox for unlinked cards in linking mode
        if (inLinkingMode && !isLinked) {
          html += '<div class="eh-cal-checkbox">';
          html += '<input type="checkbox"' + (isChecked ? ' checked' : '') + ' onclick="event.stopPropagation(); toggleCalCheckbox(\'' + SPM.esc(evt.calendarEventId) + '\')" />';
          html += '<div class="eh-cal-checkbox-content">';
        }

        // Linked badge
        if (isLinked) {
          html += '<span class="linked-badge">\u2713 Linked</span>';
        }

        // Title
        html += '<div class="eh-event-card-title">' + SPM.esc(evt.title || 'Untitled') + '</div>';

        // Meta: date, time, location
        html += '<div class="eh-event-card-meta">';
        if (evt.start) {
          html += '<div>' + SPM.esc(formatShortDate(evt.start));
          var timeRange = formatTimeRange(evt.start, evt.end);
          if (timeRange) html += ' &middot; ' + SPM.esc(timeRange);
          html += '</div>';
        }
        if (evt.location) {
          html += '<div>' + SPM.esc(evt.location) + '</div>';
        }
        html += '</div>'; // end meta

        // Close checkbox wrapper if in linking mode
        if (inLinkingMode && !isLinked) {
          html += '</div>'; // end eh-cal-checkbox-content
          html += '</div>'; // end eh-cal-checkbox
        }

        html += '</div>'; // end card
      }

      container.innerHTML = html;
    }


    // ======================================================================
    // Render All Columns
    // ======================================================================

    /**
     * Renders all three columns using current data and filter values.
     */
    function renderAll() {
      var apaFilter = document.getElementById('filterApa').value;
      var calFilter = document.getElementById('filterCal').value;

      renderApaColumn(apaFilter);
      renderLinkedColumn();
      renderCalColumn(calFilter);

      // Update linking mode visual state on calendar column
      var colCal = document.getElementById('colCal');
      var linkBar = document.getElementById('linkSelectedBar');
      if (linkingApaEventId) {
        colCal.classList.add('linking-mode');
        linkBar.classList.add('active');
        updateLinkSelectedButton();
      } else {
        colCal.classList.remove('linking-mode');
        linkBar.classList.remove('active');
      }

      // Update status text
      updateStatusText();
    }

    /**
     * Updates the status text in the top bar with counts.
     */
    function updateStatusText() {
      var needsUpdate = 0;
      for (var i = 0; i < linkedGroups.length; i++) {
        if (linkedGroups[i].needsUpdate) needsUpdate++;
      }
      var totalLinked = 0;
      for (var j = 0; j < linkedGroups.length; j++) {
        totalLinked += linkedGroups[j].calEvents.length;
      }
      var parts = [];
      parts.push(apaList.length + ' APA');
      parts.push(calList.length + ' calendar');
      parts.push(totalLinked + ' linked');
      if (needsUpdate) parts.push(needsUpdate + ' need update');
      if (ignoredApaIds.size > 0) parts.push(ignoredApaIds.size + ' ignored');
      document.getElementById('statusText').textContent = parts.join(' \u00b7 ');
    }


    // ======================================================================
    // Linking Mode (Multi-Select Checkbox)
    // ======================================================================

    /**
     * Enters linking mode: highlights the selected APA card, shows
     * the linking banner, and switches calendar cards to checkbox mode.
     *
     * @param {string} apaEventId - the APA event ID to link
     */
    function enterLinkingMode(apaEventId) {
      // Find the full APA event object
      var apaEvent = null;
      for (var i = 0; i < apaList.length; i++) {
        if (apaList[i].apaEvent && apaList[i].apaEvent.apaEventId === apaEventId) {
          apaEvent = apaList[i].apaEvent;
          break;
        }
      }
      if (!apaEvent) return;

      linkingApaEventId = apaEventId;
      linkingApaEvent = apaEvent;
      linkingApaTitle = apaEvent.title || 'Untitled';
      checkedCalIds = {};

      // Show banner
      var banner = document.getElementById('linkBanner');
      document.getElementById('linkBannerText').textContent = 'Select calendar events to link to: ' + linkingApaTitle;
      banner.classList.add('active');

      // Re-render to apply selected state and checkbox mode
      renderAll();
    }

    /**
     * Exits linking mode: removes selection, hides banner, restores
     * normal calendar card behavior. Clears checkbox state.
     */
    function exitLinkingMode() {
      linkingApaEventId = null;
      linkingApaEvent = null;
      linkingApaTitle = '';
      checkedCalIds = {};

      // Hide banner
      document.getElementById('linkBanner').classList.remove('active');

      // Re-render to remove selected state
      renderAll();
    }

    /**
     * Toggles a calendar event's checkbox in linking mode.
     * Updates the "Link Selected (N)" button count.
     *
     * @param {string} calendarEventId - the calendar event ID to toggle
     */
    function toggleCalCheckbox(calendarEventId) {
      if (checkedCalIds[calendarEventId]) {
        delete checkedCalIds[calendarEventId];
      } else {
        checkedCalIds[calendarEventId] = true;
      }

      // Re-render calendar column to update checkbox states
      var calFilter = document.getElementById('filterCal').value;
      renderCalColumn(calFilter);
      updateLinkSelectedButton();
    }

    /**
     * Updates the "Link Selected (N)" button text and disabled state
     * based on the number of checked calendar events.
     */
    function updateLinkSelectedButton() {
      var count = Object.keys(checkedCalIds).length;
      var btn = document.getElementById('linkSelectedBtn');
      btn.textContent = 'Link Selected (' + count + ')';
      btn.disabled = count === 0;
    }

    // ======================================================================
    // Data Loading
    // ======================================================================

    /**
     * Fetches sync status from the API and renders all three columns.
     * Shows skeleton loaders during first load, status text on refresh.
     */
    function loadSyncStatus() {
      clearError();
      document.getElementById('statusText').textContent = 'Loading...';
      document.getElementById('refreshBtn').disabled = true;

      // Exit linking mode on refresh
      linkingApaEventId = null;
      linkingApaEvent = null;
      linkingApaTitle = '';
      checkedCalIds = {};
      document.getElementById('linkBanner').classList.remove('active');

      SPM.callServer('getSyncStatus')
        .then(function(data) {
          if (data.error) {
            showError(data.error);
            document.getElementById('statusText').textContent = 'Error loading data.';
            return;
          }
          // API returns { syncItems: [...] }
          syncItems = data.syncItems || data.items || [];
          processSyncItems();
          renderAll();
        })
        .catch(function(err) {
          showError('Failed to load sync status: ' + err.message);
          document.getElementById('statusText').textContent = 'Error loading data.';
        })
        .finally(function() {
          document.getElementById('refreshBtn').disabled = false;
        });
    }

    /**
     * Fetches the list of ignored APA event IDs from the API.
     * Stores them in the ignoredApaIds Set for O(1) lookup.
     * Called once on page load (parallel with getSyncStatus).
     */
    function loadIgnoredEvents() {
      SPM.callServer('getIgnoredEvents')
        .then(function(data) {
          if (data.error) {
            console.warn('Failed to load ignored events:', data.error);
            return;
          }
          ignoredApaIds = new Set(data.ignoredIds || []);
          // Re-render if sync data is already loaded (race condition safe)
          if (syncItems.length > 0) {
            renderAll();
          }
        })
        .catch(function(err) {
          console.warn('Failed to load ignored events:', err.message);
        });
    }


    // ======================================================================
    // Actions
    // ======================================================================

    /**
     * Creates new Google Calendar event(s) from an unlinked APA event.
     * Multi-day events create one calendar event per day server-side.
     *
     * @param {string} apaEventId - the APA event ID to create from
     * @param {number} dayCount - number of days the event spans
     */
    function doCreate(apaEventId, dayCount) {
      var statusMsg = dayCount > 1
        ? 'Creating ' + dayCount + ' calendar events...'
        : 'Creating calendar event...';
      document.getElementById('statusText').textContent = statusMsg;

      SPM.callServer('createCalendarEvent', { apaEventId: apaEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          var created = data.created || 1;
          var toastMsg = created > 1
            ? 'Created ' + created + ' calendar events'
            : 'Event created';
          showToast(toastMsg);
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Create failed: ' + err.message);
        });
    }

    /**
     * Batch-links multiple calendar events to one APA event, with
     * optional field updates. Called from the field preview modal.
     *
     * Reads checkbox states from the modal to determine which fields
     * (title, location, description) to copy from APA to calendar.
     */
    function doBatchLink() {
      if (!linkingApaEventId || !linkingApaEvent) return;

      var calendarEventIds = Object.keys(checkedCalIds);
      if (calendarEventIds.length === 0) return;

      // Read field checkboxes from modal
      var fieldsToUpdate = {
        title: !!document.getElementById('modalFieldTitle').checked,
        location: !!document.getElementById('modalFieldLocation').checked,
        description: !!document.getElementById('modalFieldDescription').checked
      };

      var apaEventId = linkingApaEventId;

      // Close modal and exit linking mode
      closeModal();
      exitLinkingMode();

      document.getElementById('statusText').textContent = 'Linking ' + calendarEventIds.length + ' event' + (calendarEventIds.length > 1 ? 's' : '') + '...';

      SPM.callServer('batchLinkEvents', {
        apaEventId: apaEventId,
        calendarEventIds: calendarEventIds,
        fieldsToUpdate: fieldsToUpdate
      })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          var msg = calendarEventIds.length > 1
            ? calendarEventIds.length + ' events linked'
            : 'Event linked';
          showToast(msg);
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Batch link failed: ' + err.message);
        });
    }

    /**
     * Updates a single linked Google Calendar event with current APA data.
     *
     * @param {string} calendarEventId - the calendar event ID to update
     * @param {string} apaEventId - the APA event ID with fresh data
     */
    function doUpdate(calendarEventId, apaEventId) {
      document.getElementById('statusText').textContent = 'Updating calendar event...';
      SPM.callServer('updateCalendarEvent', { calendarEventId: calendarEventId, apaEventId: apaEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          showToast('Event updated');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Update failed: ' + err.message);
        });
    }

    /**
     * Updates ALL calendar events linked to a given APA event.
     * Iterates through the linked group and calls updateCalendarEvent
     * for each one sequentially.
     *
     * @param {string} apaEventId - the APA event ID whose links to update
     */
    function doUpdateAll(apaEventId) {
      // Find the group
      var group = null;
      for (var i = 0; i < linkedGroups.length; i++) {
        if (linkedGroups[i].apaEvent.apaEventId === apaEventId) {
          group = linkedGroups[i];
          break;
        }
      }
      if (!group) return;

      var calEvents = group.calEvents;
      document.getElementById('statusText').textContent = 'Updating ' + calEvents.length + ' calendar events...';

      // Chain update calls sequentially
      var chain = Promise.resolve();
      var errors = [];
      for (var c = 0; c < calEvents.length; c++) {
        (function(calId) {
          chain = chain.then(function() {
            return SPM.callServer('updateCalendarEvent', {
              calendarEventId: calId,
              apaEventId: apaEventId
            }).then(function(data) {
              if (data.error) errors.push(data.error);
            });
          });
        })(calEvents[c].calendarEventId);
      }

      chain
        .then(function() {
          if (errors.length > 0) {
            showError('Some updates failed: ' + errors.join('; '));
          } else {
            showToast(calEvents.length + ' events updated');
          }
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Update all failed: ' + err.message);
        });
    }

    /**
     * Removes the link between an APA event and a single Google Calendar event.
     * Does NOT delete the calendar event — just removes the association.
     *
     * @param {string} calendarEventId - the calendar event ID to unlink
     */
    function doUnlink(calendarEventId) {
      document.getElementById('statusText').textContent = 'Unlinking event...';
      SPM.callServer('unlinkEvent', { calendarEventId: calendarEventId })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          showToast('Event unlinked');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Unlink failed: ' + err.message);
        });
    }

    /**
     * Unlinks ALL calendar events linked to a given APA event.
     * Iterates through the linked group and calls unlinkEvent
     * for each one sequentially.
     *
     * @param {string} apaEventId - the APA event ID whose links to remove
     */
    function doUnlinkAll(apaEventId) {
      // Find the group
      var group = null;
      for (var i = 0; i < linkedGroups.length; i++) {
        if (linkedGroups[i].apaEvent.apaEventId === apaEventId) {
          group = linkedGroups[i];
          break;
        }
      }
      if (!group) return;

      var calEvents = group.calEvents;
      document.getElementById('statusText').textContent = 'Unlinking ' + calEvents.length + ' events...';

      // Chain unlink calls sequentially
      var chain = Promise.resolve();
      var errors = [];
      for (var c = 0; c < calEvents.length; c++) {
        (function(calId) {
          chain = chain.then(function() {
            return SPM.callServer('unlinkEvent', {
              calendarEventId: calId
            }).then(function(data) {
              if (data.error) errors.push(data.error);
            });
          });
        })(calEvents[c].calendarEventId);
      }

      chain
        .then(function() {
          if (errors.length > 0) {
            showError('Some unlinks failed: ' + errors.join('; '));
          } else {
            showToast(calEvents.length + ' events unlinked');
          }
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Unlink all failed: ' + err.message);
        });
    }


    /**
     * Global unlink: unlinks ALL linked calendar events across all groups.
     * Prompts for confirmation first.
     *
     * BUG FIX: Collects all calendar event IDs into a flat array BEFORE
     * starting the sequential chain. The chain references only the
     * pre-captured array, not the linkedGroups state, which could mutate
     * if a re-render happens during execution.
     */
    function doGlobalUnlinkAll() {
      // Snapshot all calendar event IDs into a flat array BEFORE any async work.
      // This prevents issues if linkedGroups mutates during the chain.
      var allCalIds = [];
      for (var g = 0; g < linkedGroups.length; g++) {
        for (var c = 0; c < linkedGroups[g].calEvents.length; c++) {
          allCalIds.push(linkedGroups[g].calEvents[c].calendarEventId);
        }
      }
      if (allCalIds.length === 0) return;

      if (!confirm('Unlink all ' + allCalIds.length + ' linked calendar events? This does not delete them.')) return;

      var totalCount = allCalIds.length;
      document.getElementById('statusText').textContent = 'Unlinking ' + totalCount + ' events...';
      document.getElementById('unlinkAllBtn').disabled = true;

      // Build sequential chain from the pre-captured flat array.
      // Each step references allCalIds[i] by closure — no live reference
      // to linkedGroups during execution.
      var chain = Promise.resolve();
      var errors = [];
      for (var i = 0; i < allCalIds.length; i++) {
        (function(calId) {
          chain = chain.then(function() {
            return SPM.callServer('unlinkEvent', { calendarEventId: calId })
              .then(function(data) {
                if (data.error) errors.push(data.error);
              })
              .catch(function(err) {
                errors.push(err.message);
              });
          });
        })(allCalIds[i]);
      }

      chain
        .then(function() {
          if (errors.length > 0) {
            showError(errors.length + ' unlinks failed');
          } else {
            showToast('All ' + totalCount + ' events unlinked');
          }
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Global unlink failed: ' + err.message);
          document.getElementById('unlinkAllBtn').disabled = false;
        });
    }

    // ======================================================================
    // Scan for Changes + Update All
    // ======================================================================

    /**
     * Calls scanForChanges API to find diffs between APA source data
     * and linked calendar events. If changes found, shows a modal
     * with a summary table. If no changes, shows a toast.
     */
    function doScanChanges() {
      document.getElementById('statusText').textContent = 'Scanning for changes...';
      document.getElementById('scanChangesBtn').disabled = true;

      SPM.callServer('scanForChanges')
        .then(function(data) {
          if (data.error) { showError(data.error); return; }

          var changes = data.changes || [];
          if (changes.length === 0) {
            showToast('All linked events are in sync');
            return;
          }

          showChangesModal(changes, data.totalChanges || changes.length);
        })
        .catch(function(err) {
          showError('Scan failed: ' + err.message);
        })
        .finally(function() {
          document.getElementById('scanChangesBtn').disabled = false;
          updateStatusText();
        });
    }

    /**
     * Shows the changes modal with a summary of all diffs found by
     * scanForChanges. Groups changes by APA event, showing the number
     * of affected calendar events and each field diff.
     *
     * @param {Array} changes - array of change objects from scanForChanges API
     * @param {number} totalChanges - total number of changes reported
     */
    function showChangesModal(changes, totalChanges) {
      // Group changes by apaEventId so we can show one block per APA event
      // with the count of affected calendar events
      var grouped = {};
      for (var i = 0; i < changes.length; i++) {
        var ch = changes[i];
        var key = ch.apaEventId;
        if (!grouped[key]) {
          grouped[key] = {
            apaTitle: ch.apaTitle || 'Untitled',
            calCount: 0,
            diffs: ch.diffs || []
          };
        }
        grouped[key].calCount++;
      }

      // Use wide modal variant for the changes table
      document.getElementById('modalContent').className = 'eh-modal eh-modal--wide';

      var html = '';
      html += '<div class="eh-modal-title">Changes Found (' + totalChanges + ')</div>';

      for (var apaId in grouped) {
        if (!grouped.hasOwnProperty(apaId)) continue;
        var grp = grouped[apaId];

        html += '<div class="eh-changes-group">';
        html += '<div class="eh-changes-group-title">' + SPM.esc(grp.apaTitle);
        html += ' <span class="eh-changes-group-count">(' + grp.calCount + ' calendar event' + (grp.calCount > 1 ? 's' : '') + ')</span>';
        html += '</div>';

        for (var d = 0; d < grp.diffs.length; d++) {
          var diff = grp.diffs[d];
          html += '<div class="eh-changes-diff">';
          html += '<span class="eh-changes-diff-field">' + SPM.esc(diff.field) + ':</span> ';
          html += '<span class="eh-changes-diff-old">' + SPM.esc(diff.calValue || '(empty)') + '</span>';
          html += ' \u2192 ';
          html += '<span class="eh-changes-diff-new">' + SPM.esc(diff.apaValue || '(empty)') + '</span>';
          html += '</div>';
        }

        html += '</div>';
      }

      html += '<div class="eh-modal-actions">';
      html += '<button class="eh-modal-btn-cancel" onclick="closeModal()">Cancel</button>';
      html += '<button class="eh-modal-btn-confirm" onclick="doApplyAllChanges()">Update All</button>';
      html += '</div>';

      // Stash changes for the Update All action
      window._pendingChanges = changes;

      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('active');
    }

    /**
     * Applies all pending changes from the scan. Sends the full changes
     * array to the applyAllChanges API, then refreshes.
     */
    function doApplyAllChanges() {
      var changes = window._pendingChanges;
      if (!changes || changes.length === 0) return;

      closeModal();
      document.getElementById('statusText').textContent = 'Applying ' + changes.length + ' changes...';

      SPM.callServer('applyAllChanges', { changes: changes })
        .then(function(data) {
          if (data.error) { showError(data.error); return; }
          var errList = data.errors || [];
          if (errList.length > 0) {
            showError(errList.length + ' updates failed: ' + errList.join('; '));
          }
          var updated = data.updated || 0;
          showToast(updated + ' event' + (updated !== 1 ? 's' : '') + ' updated');
          loadSyncStatus();
        })
        .catch(function(err) {
          showError('Apply changes failed: ' + err.message);
        })
        .finally(function() {
          window._pendingChanges = null;
        });
    }


    // ======================================================================
    // Toast & Error
    // ======================================================================

    /**
     * Shows a brief success toast at the bottom of the screen.
     * Auto-hides after 2 seconds.
     *
     * @param {string} msg - message to display
     */
    function showToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(function() {
        el.classList.remove('show');
      }, 2000);
    }

    /**
     * Shows a red error banner below the toolbar.
     *
     * @param {string} msg - error message
     */
    function showError(msg) {
      var el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = '';
    }

    /**
     * Clears the error banner.
     */
    function clearError() {
      var el = document.getElementById('errorBanner');
      el.textContent = '';
      el.style.display = 'none';
    }


    // ======================================================================
    // Initialization
    // ======================================================================

    document.addEventListener('DOMContentLoaded', function() {

      // -- Auth gate: check for admin token --
      var token = (window.SPM_CONFIG || {}).adminToken;
      if (!token) {
        document.getElementById('authError').style.display = '';
        document.getElementById('mainContent').style.display = 'none';
        return;
      }

      // Token present — show main content
      document.getElementById('authError').style.display = 'none';
      var main = document.getElementById('mainContent');
      main.style.display = 'flex';

      // -- Wire up refresh button --
      document.getElementById('refreshBtn').addEventListener('click', function() {
        loadSyncStatus();
      });

      // -- Wire up Scan Changes button --
      document.getElementById('scanChangesBtn').addEventListener('click', function() {
        doScanChanges();
      });

      // -- Wire up filter inputs --
      document.getElementById('filterApa').addEventListener('input', function() {
        renderApaColumn(this.value);
      });
      document.getElementById('filterCal').addEventListener('input', function() {
        renderCalColumn(this.value);
      });

      // -- Wire up filter toggle buttons --

      // Hide Linked toggle — APA column
      document.getElementById('toggleHideLinkedApa').addEventListener('click', function() {
        hideLinkedApa = !hideLinkedApa;
        this.classList.toggle('active', hideLinkedApa);
        this.textContent = hideLinkedApa ? 'Show All' : 'Hide Linked';
        renderApaColumn(document.getElementById('filterApa').value);
      });

      // Hide Linked toggle — Calendar column
      document.getElementById('toggleHideLinkedCal').addEventListener('click', function() {
        hideLinkedCal = !hideLinkedCal;
        this.classList.toggle('active', hideLinkedCal);
        this.textContent = hideLinkedCal ? 'Show All' : 'Hide Linked';
        renderCalColumn(document.getElementById('filterCal').value);
      });

      // Hide Ignored toggle — APA column (default: ON)
      document.getElementById('toggleHideIgnored').addEventListener('click', function() {
        hideIgnored = !hideIgnored;
        this.classList.toggle('active', hideIgnored);
        this.textContent = hideIgnored ? 'Hide Ignored' : 'Show Ignored';
        renderApaColumn(document.getElementById('filterApa').value);
      });

      // -- Wire up linking mode cancel --
      document.getElementById('linkBannerCancel').addEventListener('click', function() {
        exitLinkingMode();
      });

      // -- Wire up "Link Selected" button --
      document.getElementById('linkSelectedBtn').addEventListener('click', function() {
        showFieldPreviewModal();
      });

      // -- Escape key: exits linking mode or closes modal --
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          if (document.getElementById('modalOverlay').classList.contains('active')) {
            closeModal();
          } else if (linkingApaEventId) {
            exitLinkingMode();
          }
        }
      });

      // -- Click outside modal closes it --
      document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
          closeModal();
        }
      });

      // -- Initial load: sync status + ignored list in parallel --
      loadSyncStatus();
      loadIgnoredEvents();
    });
  </script>

</body>
</html>
